<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Carga y procesa archivos Excel de forma rápida y segura">
    <title>Nombrada Uploader</title>
    <link rel="stylesheet" href="style.css">
</head>


<body>
    <div class="container">
        <h1>Nombrada Uploader</h1>

        <div class="card">
            <label for="excel">Seleccionar Excel</label>
            <div class="upload-box">
                <input type="file" id="excel" name="excel" accept=".xlsx,.xls" aria-label="Cargar archivo Excel" />
            </div>
            <button id="btnEnviar" aria-label="Enviar archivo">
                Iniciar envío
            </button>
        </div>

        <div class="card">
            <h2>Progreso</h2>
            <div id="estado" role="status" aria-live="polite">
                Esperando archivo...
            </div>
            <div class="progress" aria-label="Barra de progreso">
                <div id="barra" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
            </div>
        </div>

        <div class="card">
            <h2>Resultado</h2>
            <div class="table-responsive">
                <table role="table">
                    <thead>
                        <tr>
                            <th scope="col">Documento</th>
                            <th scope="col">Nombre</th>
                            <th scope="col">Estado</th>
                        </tr>
                    </thead>
                    <tbody id="tabla"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
